name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependęncias e Buildar a Web
        run: |
          npm install
          npm run build

      - name: Sincronizar Capacitor com Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android || echo "Android platform already exists"
          npx cap sync android

      - name: Dar permissăo de execuçăo ao Gradle
        run: chmod +x ./android/gradlew

      - name: Compilar o APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v3
        with:
          name: survival-shooter-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
