name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Build Web
        run: |
          npm install
          npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor with Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Force Landscape & Notch Fullscreen
        run: |
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="landscape"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<style name="AppTheme.NoActionBar"/a\        <item name="android:windowFullscreen">true</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBarLaunch"/a\        <item name="android:windowFullscreen">true</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBar"/a\        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBarLaunch"/a\        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>' android/app/src/main/res/values/styles.xml

      - name: Force True Immersive Mode (Hide Status Bar)
        run: |
          cat << 'EOF' > android/app/src/main/java/com/polyshooter/game/MainActivity.java
          package com.polyshooter.game;

          import android.os.Bundle;
          import android.view.View;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  hideSystemUI();
              }

              @Override
              public void onResume() {
                  super.onResume();
                  hideSystemUI();
              }

              private void hideSystemUI() {
                  View decorView = getWindow().getDecorView();
                  decorView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                      | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                      | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_FULLSCREEN
                  );
              }
          }
          EOF

      - name: Grant Execute Permission to Gradle
        run: chmod +x ./android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polyshooter-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
