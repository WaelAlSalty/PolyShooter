name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Build Web
        run: |
          npm install
          # Arranca o plugin do Capacitor para ele nao tentar reviver a barra
          npm uninstall @capacitor/status-bar || true
          npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor with Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Configure Manifest for Fullscreen Landscape
        run: |
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="sensorLandscape"/' android/app/src/main/AndroidManifest.xml

      - name: Configure Styles
        run: |
          sed -i '/<style name="AppTheme.NoActionBar"/a\        <item name="android:windowFullscreen">true</item>\n        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBarLaunch"/a\        <item name="android:windowFullscreen">true</item>\n        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>' android/app/src/main/res/values/styles.xml

      - name: Rewrite MainActivity for Absolute Fullscreen
        run: |
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          PACKAGE_NAME=$(grep -oP '(?<=package ).*(?=;)' "$MAIN_ACTIVITY_PATH" | tr -d '\r')
          
          cat << EOF > "$MAIN_ACTIVITY_PATH"
          package $PACKAGE_NAME;

          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  forceAbsoluteFullScreen();
              }

              @Override
              public void onResume() {
                  super.onResume();
                  forceAbsoluteFullScreen();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      forceAbsoluteFullScreen();
                  }
              }

              private void forceAbsoluteFullScreen() {
                  Window window = getWindow();
                  
                  // 1. Invade a area fisica da camera (Notch) para nao sobrar borda
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                      window.getAttributes().layoutInDisplayCutoutMode = WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                  }

                  // 2. Apaga relogio, bateria e os botoes virtuais do rodape
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      // Metodo definitivo para Android 11+
                      window.setDecorFitsSystemWindows(false);
                      WindowInsetsController controller = window.getInsetsController();
                      if (controller != null) {
                          controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          controller.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  } else {
                      // Metodo classico para Android 10 ou inferior
                      window.getDecorView().setSystemUiVisibility(
                            View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_FULLSCREEN
                      );
                  }
              }
          }
          EOF

      - name: Grant Execute Permission to Gradle
        run: chmod +x ./android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polyshooter-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
