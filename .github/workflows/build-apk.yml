name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Build Web
        run: |
          npm install
          npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor with Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Configure Manifest for Fullscreen Landscape
        run: |
          # Define a orientacao como paisagem sem duplicar temas
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="sensorLandscape"/' android/app/src/main/AndroidManifest.xml

      - name: Configure Styles
        run: |
          # Forca o tema basico a aceitar tela cheia no XML
          sed -i '/<style name="AppTheme.NoActionBar"/a\        <item name="android:windowFullscreen">true</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBarLaunch"/a\        <item name="android:windowFullscreen">true</item>' android/app/src/main/res/values/styles.xml

      - name: Rewrite MainActivity for True Zombie Tsunami Immersive Mode
        run: |
          # Encontra o arquivo original independentemente do ID do app do usuario
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          
          # Extrai o nome do pacote exato que o Capacitor gerou
          PACKAGE_NAME=$(grep -oP '(?<=package ).*(?=;)' "$MAIN_ACTIVITY_PATH" | tr -d '\r')
          
          # Sobrescreve o arquivo com a configuracao IMMERSIVE_STICKY nativa
          cat << EOF > "$MAIN_ACTIVITY_PATH"
          package $PACKAGE_NAME;

          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.os.Build;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setupImmersiveStickyMode();
              }

              @Override
              public void onResume() {
                  super.onResume();
                  setupImmersiveStickyMode();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      setupImmersiveStickyMode();
                  }
              }

              private void setupImmersiveStickyMode() {
                  Window window = getWindow();
                  
                  // Libera a tela para invadir a area da camera (Notch) sem deixar borda branca
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                      window.getAttributes().layoutInDisplayCutoutMode = WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                  }
                  
                  // Modo Zombie Tsunami: Esconde botoes virtuais, relogio e bateria agressivamente.
                  // Eles so aparecem se o usuario arrastar o dedo do canto da tela (IMMERSIVE_STICKY).
                  View decorView = window.getDecorView();
                  decorView.setSystemUiVisibility(
                        View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                      | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                      | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_FULLSCREEN
                  );
              }
          }
          EOF

      - name: Grant Execute Permission to Gradle
        run: chmod +x ./android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polyshooter-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
